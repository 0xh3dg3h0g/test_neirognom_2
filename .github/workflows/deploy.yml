name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          if [ -z "$VPS_HOST" ]; then
            echo "VPS_HOST secret is empty"
            exit 1
          fi
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS_SSH_KEY secret is empty"
            exit 1
          fi
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -T 20 -p "$VPS_SSH_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync files
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "deploy/mosquitto/passwd" \
            --exclude "frontend/node_modules" \
            --exclude "frontend/dist" \
            -e "ssh -i ~/.ssh/deploy_key -p $VPS_SSH_PORT" \
            ./ "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/"

      - name: Rebuild and restart
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_SSH_PORT" "$VPS_USER@$VPS_HOST" << EOF
            set -e
            cd "$VPS_APP_DIR"
            docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d --build
            docker compose --env-file .env -f deploy/docker-compose.prod.yml ps
          EOF
